name: togaf
display_name: TOGAF Enterprise Architecture
# Bulk-driver SUBJECT routing (resolve_for_category): a CSV row whose category/name
# contains any of these picks this pack. NOTE: the togaf queue is normally run with
# `auto_generate.py --subject togaf` (which bypasses subject routing), so these
# matter only for the mixed enterprise_architecture_todo.csv. Kept distinctive
# ("togaf", "adm") so the longest-match rule doesn't collide with archimate's "archi".
aliases: [togaf, adm, architecture development method, architecture content framework,
          enterprise continuum, architecture capability framework, reference model]

# --- scene generation -------------------------------------------------------
# TOGAF is a METHODOLOGY/FRAMEWORK, not a modeling notation (no official icon set
# to load, unlike archimate) and not source code (unlike design_patterns). Its
# topics are taught with DIFFERENT visual methods depending on what they are — a
# process cycle, a technique's matrix, a concept definition, a structuring
# taxonomy, or a governance process — all built from generic _common.py shapes, so
# no subject-specific scene helpers are needed. (The per-topic method is chosen by
# `storyboard.methods` below; this guidance lists every visual the methods use.)
scene_helpers: []
scene_guidance: |
  RENDERING — TOGAF is a METHODOLOGY/FRAMEWORK, NOT a modeling notation and NOT
  source code. Build every scene from clean labelled geometry using the generic
  `_common` shapes (RoundedRectangle, Circle, Arc, the arrow helpers, Text/
  MarkupText) so the result is identical at EVERY --effort level. Different TOGAF
  topics call for different visual methods — render whichever the scene describes:
  - ADM CYCLE (process / phase topics): you do NOT have to draw a circular ring —
    a clean LINEAR layout is PREFERRED and easier to get right. Pick whichever of
    these you can render cleanly, in this order:
    1. LINEAR (preferred): the phases as labelled boxes in a single horizontal row
       (or vertical column), joined in order by STRAIGHT edge-to-edge arrows. Draw
       the Preliminary phase as a separate box BEFORE Phase A with one arrow into
       Phase A (Architecture Vision). Close the cycle with ONE right-angled (90°
       elbow / L-shaped) connector from the LAST phase shown back to Phase A, routed
       in the clear margin AROUND the row (out, along the top or bottom, back in) so
       it never crosses or clips a box. Place Requirements Management as a labelled
       box OUTSIDE the linear sequence (beside or beneath the row), joined by a THIN
       light line to EACH phase A–H it underpins — but NOT to the Preliminary phase
       (Requirements Management spans the cycle, not the one-time setup before it).
       Keep these thin lines visually subordinate to the main flow arrows.
    2. RING (only if it renders cleanly): Phases A–H as boxes on a ring joined by
       STRAIGHT edge-to-edge arrows (a clean octagon — NOT inward-bowing curves),
       Requirements Management as the central hub, the Preliminary phase OUTSIDE the
       ring with one arrow into Phase A, and a Phase-H→Phase-A closing arc bowed to
       the OUTER/far side. Use this ONLY if every arrow stays clear of every box.
    3. LOCAL (simplest fallback, when the full set is too cramped to draw cleanly):
       draw just the phase in focus PLUS its immediate previous and next phases if
       they exist — "… → previous → THIS PHASE → next → …" — focus phase in
       HIGHLIGHT, with a small "…" or note that the cycle continues. When the focus
       phase is Phase H, still show its loop back to Phase A.
    Whichever layout you use, keep these facts: the SAME phase names and A–H order;
    the cycle is Phases A–H ONLY; the Preliminary phase is NEVER one of the A–H
    boxes (it precedes Phase A); and Phase H (Architecture Change Management) returns
    to Phase A (Architecture Vision).
  - MATRIX / GRID (techniques — Gap Analysis, Risk, Stakeholder mapping): a simple
    labelled grid with row/column headers and cells, never code. Mark a gap or a
    high risk cell in DANGER and a satisfied / carried-forward cell in OK.
  - LAYERED BANDS (architecture domains, reference models): stacked labelled bands
    — Business, Data, Application, Technology — reuse ONE consistent color per
    domain / layer across all scenes.
  - SPECTRUM / TAXONOMY (Enterprise Continuum, classification): labelled bands
    along an axis that progresses generic -> specific, with example assets placed
    on it.
  - RELATIONSHIP MAP (concepts, the content metamodel): labelled boxes joined by
    ACCENT arrows that read as "has / addresses / governs / produces".
  - GOVERNANCE PROCESS (capability / governance topics): a small cycle, or a
    central board with its controls around it, plus a scale or ladder for a
    compliance level or a maturity level.
  ARROWS & CONNECTORS — every arrow must run cleanly between shapes WITHOUT
  crossing over, clipping, or resting on top of any box it does not connect:
  - Route every connector EDGE-TO-EDGE: compute where it leaves the source box's
    border and where it meets the target box's border, and start/end it THERE (a
    small gap is fine). Never let an arrow begin or end inside a box, and never let
    its arrowhead land on top of a box's fill or text. For a ray from a box centre,
    find the border-exit point first (see how the landscape ADM scenes use a
    box-edge helper) rather than aiming at the box centre.
  - Between adjacent phases (a linear row/column OR a ring), PREFER a STRAIGHT
    edge-to-edge arrow — it never has an ambiguous curve direction and never clips a
    box. If you do curve a ring's flow arrow, bow it through the gap on the OUTER
    side (AWAY from the central hub) with enough clearance that the arrowhead sits in
    the gap, not on a box — never bow it inward toward the hub.
  - The CLOSING / loop arrow (Phase H back to Phase A) and the Preliminary→Phase A
    arrow must bow to the OUTER / far side of the ring — away from the centre and
    NOT across the interior or over the A/H boxes. When two boxes sit side by side,
    arc OVER the top (the far side from any content below), clearing both boxes.
  - Keep flow arrows from overlapping the hub, the spokes, or each other.
  - For a LOOP-BACK / return / "repeats" connector in a LINEAR (row or column) layout
    — e.g. the last step looping to the first — do NOT use a wide curve that cuts
    across or clips the boxes. Use a STRAIGHT line, or a right-angled (90° elbow /
    L-shaped) path routed in the CLEAR MARGIN around the outside of the boxes (out to
    the side, along the top/bottom, back in), so it never passes over any box.
  EMPHASIS — when you put a phase / card "in focus", NEVER cover its own text with
  an opaque shape or overlay. Emphasize with a stroke-colour / stroke-width change,
  a glow or a TRANSLUCENT fill (fill_opacity <= 0.2), or Indicate / Circumscribe —
  and always keep the label drawn ON TOP and fully legible. A highlight fill behind
  the text must let the text read; if you add any overlay rectangle, give it low
  opacity and put the text above it.
  Semantic theme colors throughout: PRIMARY titles, ACCENT labels / relationships,
  HIGHLIGHT the item in focus, OK a finished / coherent result, DANGER a gap or
  problem. NEVER invent an "official TOGAF icon" — TOGAF has no standard icon set;
  represent every concept with clean labelled geometry, not glyphs.

# TOGAF has no reference symbol set to fetch or stage.
asset_source:
  type: none

# --- bulk driver (auto_generate.py) -----------------------------------------
csv: togaf_todo.csv
naming:
  title_suffix: ""               # front-matter title = slug (no suffix)
  storyboard_suffix: _storyboard.md
storyboard:
  prompt_file: storyboard_prompt.md
  # Per-topic TEACHING METHOD (SubjectPack.storyboard_method): each row's
  # "<category> <name>" picks the FIRST method below whose `match:` fragment it
  # contains, and that method's `exemplar:` is injected as the prompt's worked
  # example (its `name:` fills the prompt's {{METHOD}} token). This is what makes
  # different TOGAF topic families get taught in different ways. Order matters —
  # phases before techniques, structure before governance — see the comments.
  # Falls back to default_method + exemplar_file when nothing matches.
  exemplar_file: exemplars/concept.md       # fallback example
  default_method: concept                   # fallback method label
  methods:
    # Phases first: "Phase F Migration Planning" must be adm_cycle, not technique.
    - name: adm_cycle
      match: [adm phases, adm overview, requirements management, preliminary phase]
      exemplar: exemplars/adm_cycle.md
    - name: technique
      match: [guidelines and techniques, gap analysis, risk management,
              stakeholder management, business scenario, capability-based planning,
              migration planning techniques, applying iteration, partitioning,
              interoperability]
      exemplar: exemplars/technique.md
    - name: concept
      match: [togaf fundamentals, what is enterprise architecture, building block,
              viewpoint, concerns and views, architecture domains,
              togaf introduction, enterprise vs solution]
      exemplar: exemplars/concept.md
    # Structure before governance: "Governance Log" lives in the repository, so its
    # "...continuum and repository" category must win over the "governance" word.
    - name: structure
      match: [content framework, enterprise continuum, continuum, repository,
              reference model, deliverable, artifact, landscape,
              standards information base, reference library]
      exemplar: exemplars/structure.md
    - name: governance
      match: [capability framework, governance, architecture board, compliance,
              skills framework, maturity]
      exemplar: exemplars/governance.md
cli_flags: [--tts, gemini_id, --ai-cli, claude, --effort, xhigh,
            --run-preparation, --refine-storyboard, --validate-scenes, --force]

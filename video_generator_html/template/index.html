<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="./theme.css" />
  <!-- anime.js: a SEEKABLE animation timeline (autoplay off, scrubbed per frame).
       mermaid.js: renders clean SVG diagrams (UML/flow/sequence) from text. -->
  <script src="./vendor/anime.min.js"></script>
  <script src="./vendor/mermaid.min.js"></script>
</head>
<body>
  <div id="stage"></div>

  <script type="module">
    import {createComponents} from './components.js';

    const params = new URLSearchParams(location.search);
    const scene = params.get('scene');
    const lang = params.get('lang') || 'id';
    const orientation = params.get('orient') || 'landscape';
    const duration = parseFloat(params.get('dur') || '6');
    const isPortrait = orientation === 'portrait';
    if (isPortrait) document.body.classList.add('portrait');

    // Mermaid themed to match the palette in theme.css.
    window.mermaid.initialize({
      startOnLoad: false,
      theme: 'base',
      fontFamily: 'Noto Sans, sans-serif',
      themeVariables: {
        primaryColor: '#FFFFFF',
        primaryBorderColor: '#173B8F',
        primaryTextColor: '#172033',
        lineColor: '#64748B',
        secondaryColor: '#F6F8FB',
        tertiaryColor: '#FFFFFF',
        fontSize: '26px',
      },
    });

    const stage = document.getElementById('stage');
    const c = createComponents(lang);
    // One paused anime timeline drives the whole scene; we seek it per frame.
    const tl = window.anime.timeline({autoplay: false, easing: 'easeOutCubic', duration: 600});

    window.__error = null;
    window.__ready = false;
    window.__duration = duration;

    window.__render = (t) => {
      const ms = tl.duration > 0 ? Math.min(t * 1000, tl.duration) : 0;
      tl.seek(ms);
    };

    async function loadFonts() {
      if (!document.fonts) return;
      // Force the @font-face fonts to actually download (document.fonts.ready
      // alone resolves immediately for fonts that haven't been requested yet),
      // so Mermaid measures box sizes with the real Noto Sans / JetBrains metrics.
      const faces = [
        "400 32px 'Noto Sans'", "500 32px 'Noto Sans'",
        "600 32px 'Noto Sans'", "700 32px 'Noto Sans'",
        "400 30px 'JetBrains Mono NL'", "500 30px 'JetBrains Mono NL'",
      ];
      try {
        await Promise.all(faces.map((f) => document.fonts.load(f)));
        await document.fonts.ready;
      } catch (e) { /* fall through with whatever loaded */ }
    }

    (async () => {
      try {
        await loadFonts();   // BEFORE building (Mermaid measures text at render)
        const mod = await import(`./scenes/${scene}.js`);
        await mod.default({stage, c, L: c.L, anime: window.anime, mermaid: window.mermaid,
                           tl, duration, orientation, isPortrait});
        tl.pause();
        window.__render(0);
        window.__ready = true;
      } catch (err) {
        window.__error = (err && err.stack) ? err.stack : String(err);
        window.__ready = true;   // let the capturer observe the error and bail
      }
    })();
  </script>
</body>
</html>

[pytest]
# Default run = the Manim app suite. The Revideo suite is a separate suite with
# its own conftest; run it explicitly:  pytest tests_revideo
testpaths = tests
python_files = test_*.py
python_functions = test_*
addopts = -ra
markers =
    integration: tests that shell out to ffmpeg (skipped if a tool is missing)
    network: tests that hit the live Edge / Gemini TTS services (opt-in via VIDEO_GENERATOR_NETWORK_TESTS=1)
